# Developer-only Alembic config for authoring revisions, e.g. from backend/:
#   DB_PATH=/tmp/qv-dev.db uv run alembic revision --autogenerate -m "..."
#   DB_PATH=/tmp/qv-dev.db uv run alembic upgrade head
# The running app does NOT read this file; it builds the Config programmatically
# in queryview.connect._alembic_config() so migrations work from any cwd.
[alembic]
script_location = queryview/migrations
# Left blank: env.py derives the URL from DB_PATH (CLI) or the app's injection.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
