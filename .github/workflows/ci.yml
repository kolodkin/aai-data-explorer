name: CI

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_RUNNER_NODE_VERSION: node24

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    environment: CICD
    permissions:
      contents: write
      checks: write
    strategy:
      fail-fast: false
      matrix:
        shard: [1/1]
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
        # Probe the HTTP interface (8123) — what the backend actually uses —
        # so the readiness gate matches the app.
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --add-host=host.docker.internal:host-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Install dependencies (workspaces + e2e)
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build -w frontend

      - name: Start backend (serving built SPA)
        run: |
          SERVE_STATIC=1 uv run --frozen queryview-backend > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "Backend is up"; exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"; cat backend.log; exit 1

      - name: Run Playwright e2e tests
        env:
          BASE_URL: http://localhost:8000
          EXPECT_CLICKHOUSE_OK: "1"
        run: npx playwright test --shard=${{ matrix.shard }}

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  merge-e2e-reports:
    if: ${{ !cancelled() }}
    needs: test-e2e
    runs-on: ubuntu-latest
    environment: CICD
    permissions:
      contents: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports

      - name: Merge blob reports into HTML
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Check if report exists
        id: check-report
        if: ${{ !cancelled() }}
        run: |
          if [ -d "playwright-report" ] && [ "$(ls -A playwright-report)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "E2E report directory is present"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "E2E report directory missing or empty"
          fi

      - name: Deploy E2E Report
        if: always() && steps.check-report.outputs.exists == 'true'
        # Publishing to the external artifact-view repo needs DEPLOY_KEY; don't
        # fail the PR check when that publish can't run — the step still surfaces
        # the error as a warning annotation.
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: kolodkin/artifact-view
          publish_dir: ./playwright-report
          destination_dir: queryview-/e2e-report/${{ github.run_number }}
          publish_branch: gh-pages
          keep_files: true

      - name: Determine test outcome
        id: test-outcome
        if: always()
        run: |
          if [ "${{ needs.test-e2e.result }}" = "success" ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Create E2E Report check
        if: always()
        uses: LouisBrunner/checks-action@v2.0.0
        env:
          REPORT_URL: https://${{ github.repository_owner }}.github.io/artifact-view/queryview-/e2e-report/${{ github.run_number }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: E2E Report
          conclusion: ${{ steps.test-outcome.outputs.outcome }}
          details_url: ${{ env.REPORT_URL }}
          output: |
            {"title":"${{ steps.test-outcome.outputs.outcome == 'success' && 'Tests passed' || 'Tests failed' }}","summary":"**[View Full E2E Report](${{ env.REPORT_URL }})**"}

      - name: Delete blob report artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: blob-report-*
